<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline — IEEE Volunteer Connect</title>
<style>
    :root { color-scheme: light dark; }
    body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(135deg, #00629B 0%, #003B5C 100%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }
    .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        padding: 3rem 2rem;
        text-align: center;
        max-width: 480px;
    }
    h1 { font-size: 1.75rem; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
    p  { opacity: 0.8; line-height: 1.6; margin: 0 0 1.5rem; }
    button {
        background: #fff;
        color: #00629B;
        border: 0;
        padding: 0.75rem 1.5rem;
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: transform 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
</style>
</head>
<body>
    <div class="card" role="alert" aria-live="polite">
        <div class="icon" aria-hidden="true">📡</div>
        <h1>You&apos;re offline</h1>
        <p>It looks like you&apos;ve lost your internet connection. The cached pages you&apos;ve already visited are still available &mdash; check back once you&apos;re online again.</p>
        <button onclick="location.reload()">Retry</button>
    </div>
</body>
</html>
